<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app {
            display: flex;
            height: 100vh;
            background-color: #f7f7f8;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: #202123;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3f4b;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #3e3f4b;
        }

        .sidebar-header h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: white;
            border: 1px solid #565869;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background-color: #2a2b32;
        }

        .conversations-list {
            display: none;
        }

        .conversation-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
        }

        .conversation-item:hover {
            background-color: #2a2b32;
        }

        .conversation-item.active {
            background-color: #343541;
        }

        .conversation-title {
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-date {
            font-size: 12px;
            color: #8e8ea0;
        }

        .delete-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 16px;
        }

        .conversation-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            transform: translateY(-50%) scale(1.2);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #3e3f4b;
        }


        .settings {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            cursor: pointer;
        }

        .select-label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
        }

        .select-label select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #565869;
            background-color: #40414f;
            color: white;
            cursor: pointer;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #343541;
        }

        .chat-header {
            padding: 20px;
            background-color: #444654;
            border-bottom: 1px solid #565869;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: white;
            font-size: 18px;
        }

        .upload-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-btn {
            padding: 10px 16px;
            background-color: #10a37f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .upload-btn:hover {
            background-color: #0d8c6c;
        }

        .upload-status {
            color: #d1d5db;
            font-size: 14px;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #d1d5db;
            text-align: center;
        }

        .empty-state h2 {
            font-size: 28px;
            margin-bottom: 16px;
            color: white;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 24px;
        }

        .empty-state ul {
            list-style: none;
            font-size: 14px;
            line-height: 2;
        }

        .message {
            margin-bottom: 24px;
            padding: 16px;
            border-radius: 8px;
            max-width: 800px;
        }

        .message.user {
            background-color: #444654;
            margin-left: auto;
        }

        .message.assistant {
            background-color: #40414f;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #d1d5db;
            font-size: 14px;
        }

        .message-content {
            color: white;
            line-height: 1.6;
        }

        .message.user .message-content {
            white-space: pre-wrap;
        }

        /* Markdown element styling inside assistant messages */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin-top: 16px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .message-content h1 {
            font-size: 1.5em;
        }

        .message-content h2 {
            font-size: 1.3em;
        }

        .message-content h3 {
            font-size: 1.15em;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content ul,
        .message-content ol {
            margin: 8px 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content li>ul,
        .message-content li>ol {
            margin: 4px 0;
        }

        .message-content blockquote {
            border-left: 3px solid #565869;
            padding-left: 12px;
            margin: 8px 0;
            color: #d1d5db;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid #565869;
            margin: 16px 0;
        }

        .message-content img {
            max-width: 100%;
            border-radius: 6px;
            margin: 8px 0;
        }

        /* Markdown table styling */
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
            background-color: #40414f;
        }

        .message-content th,
        .message-content td {
            border: 1px solid #565869;
            padding: 8px 12px;
            text-align: left;
        }

        .message-content th {
            background-color: #565869;
            font-weight: 600;
        }

        .message-content tr:nth-child(even) {
            background-color: #444654;
        }

        .message-content tr:hover {
            background-color: #4a4b57;
        }

        /* Code block styling */
        .message-content pre {
            background-color: #2d2e3f;
            border: 1px solid #565869;
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message-content code {
            background-color: #2d2e3f;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
        }

        .timestamp {
            font-size: 12px;
            color: #8e8ea0;
        }

        .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #565869;
        }

        .sources details {
            cursor: pointer;
            color: #d1d5db;
        }

        .sources summary {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .source-item {
            background-color: #2a2b32;
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
        }

        .source-item strong {
            display: block;
            margin-bottom: 6px;
            color: #10a37f;
        }

        .source-item p {
            color: #d1d5db;
            line-height: 1.4;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #d1d5db;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                opacity: 0.3;
                transform: translateY(0);
            }

            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Input Form */
        .input-form {
            padding: 20px;
            background-color: #444654;
            border-top: 1px solid #565869;
            display: flex;
            gap: 12px;
        }

        .input-form input {
            flex: 1;
            padding: 14px;
            border: 1px solid #565869;
            border-radius: 8px;
            background-color: #40414f;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-form input:focus {
            border-color: #10a37f;
        }

        .input-form input::placeholder {
            color: #8e8ea0;
        }

        .input-form button {
            padding: 14px 24px;
            background-color: #10a37f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .input-form button:hover:not(:disabled) {
            background-color: #0d8c6c;
        }

        .input-form button:disabled {
            background-color: #40414f;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2b32;
        }

        ::-webkit-scrollbar-thumb {
            background: #565869;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6e6f7b;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -280px;
                z-index: 100;
                transition: left 0.3s;
            }

            .sidebar.open {
                left: 0;
            }

            .message {
                max-width: 100%;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Nexus AI</h2>
                <button onclick="startNewConversation()" class="new-chat-btn">
                    + New Chat
                </button>
            </div>
            <div class="conversations-list" id="conversationsList" style="display:none">
                <!-- Conversations hidden from UI -->
            </div>
            <div class="sidebar-footer">
                <div class="settings">
                    <label class="checkbox-label">
                        <input type="checkbox" id="useRag" checked>
                        Use RAG
                    </label>

                    <label class="select-label">
                        Model:
                        <select id="modelSelect">
                            <option value="meta-llama/Llama-3.1-8B-Instruct:hf-inference" selected>Llama 3.1 8B Instruct
                            </option>
                            <option value="mistralai/Mistral-7B-Instruct-v0.3">Mistral 7B Instruct</option>
                            <option value="HuggingFaceH4/zephyr-7b-beta">Zephyr 7B Beta</option>
                        </select>
                    </label>
                </div>
            </div>
        </div>
        <!-- Main Chat Area -->
        <div class="main-content">
            <div class="chat-header">
                <h3 id="chatTitle">Start a New Conversation</h3>
                <div class="upload-section">
                    <label class="upload-btn">
                        &#128206; Upload Document
                        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display: none;"
                            onchange="handleFileUpload(event)">
                    </label>
                    <span class="upload-status" id="uploadStatus"></span>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state" id="emptyState">
                    <h2>Welcome to Nexus AI</h2>
                    <p>Upload documents and start asking questions!</p>

                </div>
            </div>

            <form class="input-form" id="messageForm" onsubmit="handleSendMessage(event)">
                <input type="text" id="messageInput" placeholder="Ask a question..." autocomplete="off">
                <button type="submit" id="sendButton">Send</button>
            </form>
        </div>
    </div>
    <script>
        function resolveApiUrl() {
            const queryApiUrl = new URLSearchParams(window.location.search).get('api');
            if (queryApiUrl) {
                return queryApiUrl.replace(/\/+$/, '');
            }

            const storedApiUrl = localStorage.getItem('api_url');
            if (storedApiUrl) {
                return storedApiUrl.replace(/\/+$/, '');
            }

            // When served from the backend itself, use the same origin
            const { protocol, hostname, port } = window.location;

            // For local development on port 5500, point to the FastAPI backend
            if (hostname === '127.0.0.1' || hostname === 'localhost') {
                if (port === '5500') {
                    return 'http://127.0.0.1:8000/api';
                }
            }

            if (protocol === 'http:' || protocol === 'https:') {
                return `${protocol}//${hostname}${port ? ':' + port : ''}/api`;
            }

            return 'http://127.0.0.1:8000/api';
        }
        const API_URL = resolveApiUrl();
        let conversations = [];
        let currentConversation = null;
        let messages = [];
        let loading = false;
        async function apiFetch(path, options = {}) {
            try {
                const response = await fetch(`${API_URL}${path}`, options);
                if (!response.ok) {
                    const raw = await response.text();
                    let detail = '';

                    if (raw) {
                        try {
                            const payload = JSON.parse(raw);
                            detail = payload.detail || payload.message || '';
                        } catch (_) {
                            if (!raw.trim().startsWith('<!DOCTYPE')) {
                                detail = raw.trim();
                            }
                        }
                    }

                    throw new Error(detail || `Request failed (${response.status})`);
                }
                return response;
            } catch (error) {
                if (error instanceof TypeError && error.message === 'Failed to fetch') {
                    const currentOrigin = window.location.origin === 'null' ? 'null (file://)' : window.location.origin;
                    throw new Error(`Cannot reach API (${API_URL}). Make sure the backend is running and '${currentOrigin}' is included in ALLOWED_ORIGINS.`);
                }
                throw error;
            }
        }
        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Using API URL:', API_URL);
        });

        // Start new conversation
        function startNewConversation() {
            currentConversation = null;
            messages = [];
            renderMessages();
            updateChatTitle();
        }

        // Update chat title
        function updateChatTitle() {
            const title = document.getElementById('chatTitle');
            title.textContent = currentConversation ? 'Conversation' : 'Start a New Conversation';
        }

        // Render messages
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const emptyState = document.getElementById('emptyState');

            if (messages.length === 0) {
                emptyState.classList.remove('hidden');
                // Clear any existing messages
                const existingMessages = container.querySelectorAll('.message');
                existingMessages.forEach(msg => msg.remove());
                return;
            }

            emptyState.classList.add('hidden');

            // Clear existing messages
            const existingMessages = container.querySelectorAll('.message');
            existingMessages.forEach(msg => msg.remove());

            messages.forEach((message, index) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.role}`;

                let sourcesHtml = '';
                if (message.sources && message.sources.length > 0) {
                    const sourcesItems = message.sources.map((source, idx) => `
                        <div class="source-item">
                            <strong>${source.metadata.filename}</strong>
                            <p>${source.content.substring(0, 200)}...</p>
                        </div>
                    `).join('');

                    sourcesHtml = `
                        <div class="sources">
                            <details>
                                <summary>&#128218; Sources (${message.sources.length})</summary>
                                ${sourcesItems}
                            </details>
                        </div>
                    `;
                }

                messageDiv.innerHTML = `
                    <div class="message-header">
                        <strong>${message.role === 'user' ? 'You' : 'Assistant'}</strong>
                        <span class="timestamp">${formatTimestamp(message.timestamp)}</span>
                    </div>
                    <div class="message-content">${message.role === 'assistant' ? marked.parse(message.content) : escapeHtml(message.content)}</div>
                    ${sourcesHtml}
                `;

                container.appendChild(messageDiv);
            });
            // Scroll to bottom
            scrollToBottom();
        }
        // Format timestamp
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        // Escape HTML for user input
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // Escape HTML for user input
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // Scroll to bottom
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
        // Handle send message
        async function handleSendMessage(event) {
            event.preventDefault();

            const input = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const userMessage = input.value.trim();

            if (!userMessage || loading) return;

            input.value = '';
            loading = true;
            sendButton.disabled = true;

            // Add user message to UI immediately
            const tempUserMessage = {
                role: 'user',
                content: userMessage,
                timestamp: new Date().toISOString()
            };
            messages.push(tempUserMessage);
            renderMessages();

            // Show typing indicator
            showTypingIndicator();

            try {
                const useRag = document.getElementById('useRag').checked;
                const model = document.getElementById('modelSelect').value;

                const response = await apiFetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: userMessage,
                        conversation_id: currentConversation,
                        use_rag: useRag,
                        model: model
                    }),
                });

                const data = await response.json();

                // Update current conversation ID
                if (!currentConversation) {
                    currentConversation = data.conversation_id;
                    updateChatTitle();
                }

                // Remove typing indicator
                hideTypingIndicator();

                // Add assistant response
                const assistantMessage = {
                    role: 'assistant',
                    content: data.response,
                    timestamp: new Date().toISOString(),
                    sources: data.sources
                };
                messages.push(assistantMessage);
                renderMessages();

            } catch (error) {
                console.error('Error sending message:', error);
                hideTypingIndicator();

                const errorMessage = {
                    role: 'assistant',
                    content: 'Sorry, there was an error processing your request.',
                    timestamp: new Date().toISOString()
                };
                messages.push(errorMessage);
                renderMessages();
            } finally {
                loading = false;
                sendButton.disabled = false;
                input.focus();
            }
        }
        // Show typing indicator
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-header">
                    <strong>Assistant</strong>
                </div>
                <div class="message-content typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(typingDiv);
            scrollToBottom();
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }
        // Handle file upload (async with polling)
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusElement = document.getElementById('uploadStatus');
            statusElement.textContent = 'Uploading...';
            statusElement.style.color = '';

            console.log('Uploading file:', {
                name: file.name,
                type: file.type,
                size: file.size,
                lastModified: new Date(file.lastModified).toLocaleDateString()
            });

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await apiFetch('/upload', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                console.log('Upload response:', {
                    status: response.status,
                    ok: response.ok,
                    data: data
                });

                // If async (job_id returned), poll for completion
                if (data.job_id) {
                    statusElement.textContent = `Processing '${file.name}'...`;
                    const result = await pollUploadStatus(data.job_id);
                    if (result.status === 'completed') {
                        const textChunks = result.text_chunks || 0;
                        statusElement.textContent = `\u2705 ${result.filename || file.name} processed (${textChunks} text chunks)`;
                    } else if (result.status === 'failed') {
                        statusElement.textContent = `\u274c Error: ${result.error || 'Processing failed'}`;
                        statusElement.style.color = '#ff6b6b';
                    }
                } else {
                    // Legacy sync response fallback
                    const successMessage = data.filename ? `'${data.filename}' uploaded` : 'Upload successful';
                    const textChunks = typeof data.chunks === 'number' ? data.chunks : 0;
                    statusElement.textContent = `\u2705 ${successMessage} (${textChunks} text chunks)`;
                }

                setTimeout(() => {
                    statusElement.textContent = '';
                    statusElement.style.color = '';
                }, 5000);
            } catch (error) {
                console.error('Error uploading file:', error);
                statusElement.textContent = `Error: ${error.message || 'Upload failed'}`;
                statusElement.style.color = '#ff6b6b';

                setTimeout(() => {
                    statusElement.textContent = '';
                    statusElement.style.color = '';
                }, 10000);
            }

            event.target.value = '';
        }

        async function pollUploadStatus(jobId, maxWaitMs = 300000) {
            const interval = 1500;
            const start = Date.now();
            while (Date.now() - start < maxWaitMs) {
                try {
                    const resp = await apiFetch(`/upload/status/${jobId}`);
                    const data = await resp.json();
                    if (data.status === 'completed' || data.status === 'failed') {
                        return data;
                    }
                } catch (e) {
                    console.warn('Poll error:', e);
                }
                await new Promise(r => setTimeout(r, interval));
            }
            return { status: 'failed', error: 'Timed out waiting for processing' };
        }


        // Enable enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage(e);
            }
        });
    </script>
</body>

</html>
